<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CloudBanana DE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Login Manager (Display Manager) -->
  <div id="login-screen">
    <div class="login-card">
      <div class="login-logo">🍌</div>
      <h1 class="login-title">CloudBanana DE</h1>
      <p class="login-desc">Lightweight VPS Desktop Environment</p>
      <div id="login-form">
        <input type="text" id="login-username" placeholder="Username">
        <input type="password" id="login-password" placeholder="Password">
        <button id="login-btn" class="login-btn">Log In</button>
        <div id="login-error" class="login-msg"></div>
      </div>
      <div id="register-form" style="display:none;">
        <input type="text" id="reg-username" placeholder="Username">
        <input type="email" id="reg-email" placeholder="Email">
        <input type="password" id="reg-password" placeholder="Password">
        <input type="password" id="reg-password-confirm" placeholder="Confirm Password">
        <button id="reg-btn" class="login-btn">Create Admin</button>
        <div id="reg-error" class="login-msg"></div>
      </div>
    </div>
    <div class="login-footer">CloudBanana DE v0.1 · Session: VPS Desktop</div>
  </div>

  <!-- Desktop Environment -->
  <div id="desktop" style="display:none;">

    <!-- Desktop wallpaper + windows layer -->
    <div id="desktop-workspace"></div>

    <!-- Desktop Context Menu -->
    <div id="desktop-menu" style="display:none;">
      <button class="ctx-item" data-win="taskmgr">📊 System Monitor</button>
      <button class="ctx-item" data-win="terminal">📟 Terminal</button>
      <button class="ctx-item" data-win="apps">📦 Software Center</button>
      <button class="ctx-item" data-win="www">📁 File Manager</button>
      <button class="ctx-item" data-win="wget">⬇ wget</button>
      <button class="ctx-item" data-win="settings">⚙ Settings</button>
      <div class="ctx-sep"></div>
      <button class="ctx-item" id="ctx-show-desktop">Show Desktop</button>
      <button class="ctx-item" id="ctx-reload">🔄 Reload</button>
      <button class="ctx-item" id="ctx-wallpaper">🖼 Change Wallpaper</button>
    </div>

    <!-- Application Menu (Start Menu) -->
    <div id="start-menu" style="display:none;">
      <div class="start-header">🍌 CloudBanana DE</div>
      <div class="start-body">
        <button class="start-item" data-win="taskmgr">📊 System Monitor</button>
        <button class="start-item" data-win="terminal">📟 Terminal</button>
        <button class="start-item" data-win="apps">📦 Software Center</button>
        <button class="start-item" data-win="www">📁 File Manager</button>
        <button class="start-item" data-win="users" id="start-users" style="display:none;">👥 Users</button>
        <button class="start-item" data-win="subdomain">🌐 Subdomain</button>
        <button class="start-item" data-win="wget">⬇ wget</button>
        <button class="start-item" data-win="settings">⚙ Settings</button>
        <div class="ctx-sep"></div>
        <button class="start-item" id="start-logout">🔒 Lock / Log Out</button>
      </div>
    </div>

    <!-- Taskbar / Panel -->
    <div id="taskbar">
      <div id="task-left">
        <button id="start-btn" class="task-btn">🍌</button>
        <button class="task-btn task-pinned" data-win="terminal" title="Terminal">📟</button>
        <button class="task-btn task-pinned" data-win="www" title="File Manager">📁</button>
        <button class="task-btn task-pinned" data-win="settings" title="Settings">⚙</button>
        <div id="task-items"></div>
      </div>
      <div id="task-right">
        <span id="task-cpu" class="task-tray" title="CPU">--</span>
        <span id="task-ram" class="task-tray" title="RAM">--</span>
        <span id="task-clock" class="task-tray"></span>
        <button id="logout-btn" class="task-btn" title="Log Out">⏻</button>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
