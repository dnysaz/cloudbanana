<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CloudBanana</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header id="main-header">
    <h1>🍌 CloudBanana</h1>
  </header>

  <div id="auth-section">
    <div id="register-form" class="auth-card" style="display:none;">
      <div class="auth-icon">🍌</div>
      <h2>Setup Admin Account</h2>
      <p class="auth-desc">Create the first admin account.</p>
      <input type="text" id="reg-username" placeholder="Username" autocomplete="off">
      <input type="email" id="reg-email" placeholder="Email" autocomplete="off">
      <div class="pw-field">
        <input type="password" id="reg-password" placeholder="Password" autocomplete="new-password">
        <button class="pw-toggle" data-target="reg-password" type="button" aria-label="Toggle password visibility">
          <svg class="eye-open" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg class="eye-closed" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19M14.12 14.12a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
      </div>
      <div class="pw-field">
        <input type="password" id="reg-password-confirm" placeholder="Confirm Password" autocomplete="new-password">
        <button class="pw-toggle" data-target="reg-password-confirm" type="button" aria-label="Toggle password visibility">
          <svg class="eye-open" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg class="eye-closed" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19M14.12 14.12a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
      </div>
      <button id="reg-btn" class="btn btn-full">Create Admin</button>
      <div id="reg-error" class="msg"></div>
    </div>

    <div id="login-form" class="auth-card" style="display:none;">
      <div class="auth-icon">🍌</div>
      <h2>Login</h2>
      <p class="auth-desc">Sign in to your account.</p>
      <input type="text" id="login-username" placeholder="Username" autocomplete="username">
      <div class="pw-field">
        <input type="password" id="login-password" placeholder="Password" autocomplete="current-password">
        <button class="pw-toggle" data-target="login-password" type="button" aria-label="Toggle password visibility">
          <svg class="eye-open" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg class="eye-closed" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19M14.12 14.12a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
      </div>
      <button id="login-btn" class="btn btn-full">Login</button>
      <div id="login-error" class="msg"></div>
    </div>
  </div>

  <div id="dashboard" style="display:none;">
    <div id="dash-header">
      <div id="dash-user"><span id="user-info"></span></div>
      <button id="logout-btn" class="btn-outline">Logout</button>
    </div>

    <nav id="tabs">
      <button class="tab active" data-tab="tab-dashboard">Dashboard</button>
      <button class="tab" data-tab="tab-apps">Applications</button>
      <button class="tab" data-tab="tab-users" id="tab-users-btn" style="display:none;">Users</button>
    </nav>

    <div id="tab-content">
      <section id="tab-dashboard" class="tab-pane active">
        <div class="dash-grid">
          <div class="card chart-card">
            <div class="card-header">
              <span class="card-title">CPU Usage</span>
              <span class="card-value" id="cpu-val">0%</span>
            </div>
            <div class="chart-wrap">
              <svg id="cpu-chart" viewBox="0 0 300 100" preserveAspectRatio="none" class="cpu-svg"></svg>
            </div>
          </div>

          <div class="mem-stack">
            <div class="card bar-card">
              <div class="card-header">
                <span class="card-title">RAM</span>
                <span class="card-value" id="ram-val">0%</span>
              </div>
              <div class="bar-track">
                <div class="bar-fill bar-ram" id="ram-bar" style="width:0%"></div>
              </div>
              <div class="bar-foot"><span id="ram-detail">0 / 0 GB</span></div>
            </div>
            <div class="card bar-card">
              <div class="card-header">
                <span class="card-title">Swap</span>
                <span class="card-value" id="swap-val">0%</span>
              </div>
              <div class="bar-track">
                <div class="bar-fill bar-swap" id="swap-bar" style="width:0%"></div>
              </div>
              <div class="bar-foot"><span id="swap-detail">0 / 0 GB</span></div>
            </div>
          </div>
        </div>

        <div class="card bar-card">
          <div class="card-header">
            <span class="card-title">Disk</span>
            <span class="card-value" id="disk-val">0%</span>
          </div>
          <div class="bar-track">
            <div class="bar-fill bar-disk" id="disk-bar" style="width:0%"></div>
          </div>
        </div>
      </section>

      <section id="tab-apps" class="tab-pane">
        <div class="constrained">
          <div class="card">
            <h3>Available Applications</h3>
            <div class="app-list">
              <div class="app-item">
                <div class="app-info">
                  <strong>Docker</strong>
                  <span class="app-desc">Container runtime engine</span>
                </div>
                <button id="install-docker" class="btn">Install</button>
              </div>
            </div>
            <div id="status-message" class="msg"></div>
          </div>
        </div>
      </section>

      <section id="tab-users" class="tab-pane">
        <div class="constrained">
          <div class="card">
            <h3>Add User</h3>
            <div class="form-row">
              <input type="text" id="new-username" placeholder="Username">
              <input type="email" id="new-email" placeholder="Email">
            </div>
            <div class="pw-field" style="max-width:300px;">
              <input type="password" id="new-password" placeholder="Password">
              <button class="pw-toggle" data-target="new-password" type="button" aria-label="Toggle password visibility">
                <svg class="eye-open" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg class="eye-closed" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19M14.12 14.12a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </button>
            </div>
            <button id="add-user-btn" class="btn">Add User</button>
            <div id="add-user-error" class="msg"></div>
          </div>

          <div class="card">
            <h3>Existing Users</h3>
            <div id="user-list"></div>
          </div>
        </div>
      </section>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
